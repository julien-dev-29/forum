{{define "content"}}

<div class="container">
    <h1 class="py-5">
        Yolo les kikis!
    </h1>
    <div class="row">
        <div class="col-lg-9 mb-3">
            <div class="row text-left mb-5">
                <div class="col-lg-6 mb-3 mb-sm-0">
                    <div class="dropdown bootstrap-select form-control form-control-lg bg-op-9 text-sm w-lg-50"
                        style="width: 100%;">
                        <select class="form-control form-control-lg bg-op-9 text-sm w-lg-50" data-toggle="select"
                            tabindex="-98">
                            <option> Categories </option>
                            <option> Learn </option>
                            <option> Share </option>
                            <option> Build </option>
                        </select>
                    </div>
                </div>
                <div class="col-lg-6 text-lg-right">
                    <div class="dropdown bootstrap-select form-control form-control-lg bg-op-9 ml-auto text-sm w-lg-50"
                        style="width: 100%;">
                        <select class="form-control form-control-lg bg-op-9 ml-auto text-sm w-lg-50"
                            data-toggle="select" tabindex="-98">
                            <option> Filter by </option>
                            <option> Votes </option>
                            <option> Replys </option>
                            <option> Views </option>
                        </select>
                    </div>
                </div>
            </div>
            {{ range .Posts }}
            <div
                class="card row-hover pos-relative py-3 px-3 mb-3 border-primary-subtle border-top-0 border-right-0 border-bottom-0 rounded-0">
                <div class="row align-items-center">
                    <div class="col-md-8 mb-3 mb-sm-0">
                        <h5>
                            <a href="#" class="text-primary">Drupal 8 quick starter guide</a>
                        </h5>
                        <p class="text-sm"><span class="op-6">Posted</span> <a class="text-secondary" href="#">20
                                minutes</a>
                            <span class="op-6">ago by</span> <a class="text-secondary" href="#">KenyeW</a>
                        </p>
                        <div class="text-sm op-5"> <a class="mr-2 text-secondary" href="#">#C++</a> <a
                                class="mr-2 text-secondary" href="#">#AppStrap Theme</a> <a class="mr-2 text-secondary"
                                href="#">#Wordpress</a> </div>
                    </div>
                    <div class="col-md-4 op-7">
                        <div class="row text-center op-7">
                            <div class="col px-1"> <i class="ion-connection-bars icon-1x"></i> <span
                                    class="d-block text-sm">141
                                    Votes</span> </div>
                            <div class="col px-1"> <i class="ion-ios-chatboxes-outline icon-1x"></i> <span
                                    class="d-block text-sm">122 Replys</span> </div>
                            <div class="col px-1"> <i class="ion-ios-eye-outline icon-1x"></i> <span
                                    class="d-block text-sm">290
                                    Views</span> </div>
                        </div>
                    </div>
                </div>
            </div>
            {{ end }}
        </div>
        {{ block "sidebar" .}} {{ end }}
    </div>
</div>
{{end}}
