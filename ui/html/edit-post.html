{{define "edit-post.html"}}{{template "base" .}}
<div class="create-post">
    <h2>Edit Post</h2>
    {{if .Error}}
        <p class="error">{{.Error}}</p>
    {{end}}
    <form action="/post/edit" method="post" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <input type="hidden" name="id" value="{{.Post.ID}}">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" value="{{.Post.Title}}" required>

        <label for="content">Content</label>
        <textarea id="content" name="content" rows="10" required>{{.Post.Content}}</textarea>

        <label for="image">Image (optional)</label>
        <input type="file" id="image" name="image" accept=".jpg,.jpeg,.png,.gif">
        {{if .Post.ImagePath}}
            <div class="current-image">
                <img src="{{.Post.ImagePath}}" alt="Current image" class="post-image-thumb">
                <label class="checkbox-label">
                    <input type="checkbox" name="remove_image" value="1"> Remove current image
                </label>
            </div>
        {{end}}

        <fieldset>
            <legend>Categories</legend>
            {{range .Categories}}
                <label class="checkbox-label">
                    <input type="checkbox" name="categories" value="{{.ID}}"
                        {{if index $.SelectedCatIDs .ID}}checked{{end}}> {{.Name}}
                </label>
            {{end}}
        </fieldset>

        <button type="submit" class="btn">Save Changes</button>
        <a href="/post?id={{.Post.ID}}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{{template "base-close" .}}{{end}}
