{{define "edit-post.html"}}{{template "base" .}}
<div class="create-post">
    <h2>Edit Post</h2>
    {{if .Error}}
        <p class="error">{{.Error}}</p>
    {{end}}
    <form action="/post/edit" method="post">
        <input type="hidden" name="id" value="{{.Post.ID}}">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" value="{{.Post.Title}}" required>

        <label for="content">Content</label>
        <textarea id="content" name="content" rows="10" required>{{.Post.Content}}</textarea>

        <fieldset>
            <legend>Categories</legend>
            {{range .Categories}}
                <label class="checkbox-label">
                    <input type="checkbox" name="categories" value="{{.ID}}"
                        {{if index $.SelectedCatIDs .ID}}checked{{end}}> {{.Name}}
                </label>
            {{end}}
        </fieldset>

        <button type="submit" class="btn">Save Changes</button>
        <a href="/post?id={{.Post.ID}}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{{template "base-close" .}}{{end}}
