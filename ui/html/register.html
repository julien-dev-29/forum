{{define "register.html"}}{{template "base" .}}
<div class="auth-form">
    <h2>Register</h2>
    {{if .Error}}
        <p class="error">{{.Error}}</p>
    {{end}}
    <form action="/register" method="post">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
        <button type="submit" class="btn">Register</button>
    </form>
    <div class="oauth-divider"><span>or</span></div>
    <div class="oauth-buttons">
        <form action="/auth/google/login" method="get">
            <button type="submit" class="oauth-btn oauth-google">Continue with Google</button>
        </form>
        <form action="/auth/github/login" method="get">
            <button type="submit" class="oauth-btn oauth-github">Continue with GitHub</button>
        </form>
    </div>
    <p class="auth-link">Already have an account? <a href="/login">Login</a></p>
</div>
{{template "base-close" .}}{{end}}
